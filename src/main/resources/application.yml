spring:
  application:
    name: approval-service
  
  # H2 数据库配置
  datasource:
    url: jdbc:h2:file:./db/approval_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=USER,VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # H2 Console 配置
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # Flowable 配置
  flowable:
    database-schema-update: true
    async-executor-activate: true
  
  # MyBatis-Plus 配置
  mybatis-plus:
    mapper-locations: classpath:mapper/**/*.xml
    type-aliases-package: com.universal.approval.entity
    configuration:
      map-underscore-to-camel-case: true

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api

# 日志配置
logging:
  level:
    org.flowable: info
    com.universal.approval: debug

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics