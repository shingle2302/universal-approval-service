spring:
  datasource:
    url: jdbc:h2:mem:approval_test;MODE=LEGACY;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=USER,VALUE;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: never
  flowable:
    database-schema-update: true
    async-executor-activate: false
    db-history-used: true
